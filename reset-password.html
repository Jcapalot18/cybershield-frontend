<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CyberShield — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b12;color:#fff;font-family:'Hanken Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.box{background:#0d1220;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:3rem 2.5rem;max-width:420px;width:100%;position:relative}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#FF6B00,transparent);border-radius:16px 16px 0 0}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1rem;margin-bottom:2.5rem;text-decoration:none;color:#fff}
.logo span{color:#FF6B00}
.logo svg{width:24px;height:24px}
h1{font-size:1.4rem;font-weight:800;margin-bottom:0.5rem;letter-spacing:-0.02em}
.sub{font-size:0.82rem;color:rgba(255,255,255,0.45);margin-bottom:2rem;line-height:1.6}
.f-group{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
label{font-size:0.62rem;font-weight:700;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.1em}
input{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:11px 14px;color:#fff;font-size:0.875rem;font-family:'Hanken Grotesk',sans-serif;outline:none;transition:all 0.2s;width:100%}
input:focus{border-color:#FF6B00;background:rgba(255,107,0,0.03);box-shadow:0 0 0 3px rgba(255,107,0,0.08)}
input::placeholder{color:rgba(255,255,255,0.2)}
.btn{width:100%;background:#FF6B00;color:#fff;border:none;border-radius:8px;padding:13px;font-size:0.875rem;font-weight:700;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;transition:all 0.2s;margin-top:0.5rem;box-shadow:0 4px 16px rgba(255,107,0,0.25)}
.btn:hover{background:#ff8c00;transform:translateY(-1px)}
.btn:disabled{opacity:0.5;cursor:default;transform:none}
.msg{font-size:0.8rem;padding:10px 14px;border-radius:6px;margin-bottom:1rem}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399}
.strength-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-top:4px}
.strength-fill{height:100%;border-radius:2px;transition:all 0.3s}
.strength-label{font-size:0.6rem;color:rgba(255,255,255,0.35);margin-top:3px}
a.back{font-size:0.78rem;color:rgba(255,255,255,0.35);text-decoration:none;display:flex;align-items:center;gap:5px;margin-bottom:1.5rem;transition:color 0.2s}
a.back:hover{color:rgba(255,255,255,0.6)}
</style>
</head>
<body>
<div class="box">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 30 36" fill="none"><path d="M15 1L29 6.5V21C29 30 22 35.5 15 37.5C8 35.5 1 30 1 21V6.5L15 1Z" fill="rgba(255,107,0,0.08)" stroke="#FF6B00" stroke-width="1.5"/><path d="M15 11L20 14L15 17L10 14Z" fill="rgba(255,107,0,0.2)" stroke="#FF6B00" stroke-width="1.25" stroke-linejoin="round"/><path d="M10 14L15 17V23L10 20Z" stroke="#FF6B00" stroke-width="1.25" stroke-linejoin="round"/><path d="M20 14L15 17V23L20 20Z" fill="rgba(255,107,0,0.1)" stroke="#FF6B00" stroke-width="1.25" stroke-linejoin="round"/></svg>
    Cyber<span>Shield</span>
  </a>
  <a href="auth.html" class="back">← Back to sign in</a>
  <div id="form-view">
    <h1>Set new password</h1>
    <div class="sub">Enter your new password below. Must be at least 8 characters.</div>
    <div id="msg" style="display:none" class="msg"></div>
    <div class="f-group">
      <label>New password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>
    <div class="f-group">
      <label>Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
    </div>
    <button class="btn" id="submit-btn" onclick="handleReset()">Set new password →</button>
  </div>
  <div id="success-view" style="display:none;text-align:center;padding:1rem 0">
    <div style="width:64px;height:64px;background:rgba(16,185,129,0.1);border:2px solid rgba(16,185,129,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.75rem">✓</div>
    <h1 style="margin-bottom:0.75rem">Password updated!</h1>
    <p style="font-size:0.85rem;color:rgba(255,255,255,0.45);margin-bottom:1.5rem">Your password has been changed. You can now sign in with your new password.</p>
    <a href="auth.html" class="btn" style="text-decoration:none;display:inline-block;text-align:center">Sign in →</a>
  </div>
</div>
<script>
const API = 'https://cybershield-backend-production-492b.up.railway.app';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

if (!token || !email) {
  document.getElementById('form-view').innerHTML = '<div class="msg error" style="display:block">Invalid or expired reset link. <a href="auth.html?forgot=true" style="color:#f87171">Request a new one</a></div>';
}

function checkStrength(pwd) {
  const fill = document.getElementById('strength-fill');
  const lbl = document.getElementById('strength-label');
  const score = [pwd.length>=8, /[A-Z]/.test(pwd), /[0-9]/.test(pwd), /[^A-Za-z0-9]/.test(pwd)].filter(Boolean).length;
  const configs = [[0,'','#ef4444'],[1,'Weak','#ef4444'],[2,'Fair','#f59e0b'],[3,'Good','#FF6B00'],[4,'Strong','#10B981']];
  const [,text,color] = configs[score] || configs[0];
  fill.style.width = (score*25)+'%';
  fill.style.background = color;
  lbl.textContent = text;
  lbl.style.color = color;
}

async function handleReset() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showError('Passwords do not match.'); return; }

  btn.textContent = 'Updating...'; btn.disabled = true;
  try {
    const r = await fetch(`${API}/auth/reset-password`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token, email, password }) });
    const d = await r.json();
    if (r.ok) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    } else {
      showError(d.error || 'Failed to reset password.');
      btn.textContent = 'Set new password →'; btn.disabled = false;
    }
  } catch(e) {
    showError('Connection error. Please try again.');
    btn.textContent = 'Set new password →'; btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('msg');
  el.className = 'msg error'; el.textContent = msg; el.style.display = 'block';
}

document.addEventListener('keydown', e => { if(e.key==='Enter') handleReset(); });
</script>
</body>
</html>
